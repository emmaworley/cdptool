<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="color-scheme" content="dark">
  <title>cdptool — CDP Archive Extractor</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main>
    <h1><a href="https://github.com/emmaworley/cdptool">cdptool</a></h1>
    <p class="subtitle">Extract files from CDP (CHUMP) archives.</p>

    <div id="drop-zone" tabindex="0">
      <p>Drop a <code>.cdp</code> file here to extract</p>
      <p class="hint">or click to browse</p>
    </div>

    <div id="status" hidden></div>

    <div id="results" hidden>
      <div id="results-header">
        <h2 id="results-title"></h2>
        <button id="download-btn">Download .zip</button>
      </div>
      <div id="progress" hidden>
        <div id="progress-bar"><div id="progress-fill"></div></div>
        <p id="progress-text"></p>
      </div>
      <pre id="info-output"></pre>
    </div>
  </main>

  <script type="module" src="app.js"></script>
</body>
</html>
