name: CI
on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable,nightly
          components: clippy,rustfmt,rust-src
      - run: cargo install cargo-careful
      - run: make test
      - run: make lint
      - run: make fmt
